# =====================================================================
# Step 3: 글 생성 + final/ 스택 저장
# =====================================================================
# 트리거:
#   - 수동 (workflow_dispatch)
#   - Step 2 완료 시 자동 트리거 (workflow_run)
#
# 흐름 (전체 대기 글 루프):
#   write.py next         → 다음 대상 선택 (FIFO)
#   write.py prep         → 소스 수집 → write_prompt 생성
#   gemini_api.py         → Gemini 초안 → drafts/ 저장
#   write.py review       → review_prompt 생성
#   gemini_review_api.py  → Gemini 팩트체크 → final/ 저장
#   write.py done         → pipeline 완료 기록 (루프 방지 핵심!)
#   git commit            → research_data/write/final/ 만 커밋
#
# ⚠️ _posts/ 커밋 금지 — final/에 스택으로만 쌓음
# =====================================================================

name: Step 3 - Write Articles

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Step 2 - Plan Articles"]
    types:
      - completed

jobs:
  write:
    runs-on: ubuntu-latest
    timeout-minutes: 70

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 1. 체크아웃 ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 설치 ─────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. 패키지 설치 ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ── 4. Git 설정 ────────────────────────────────────────────────
      - name: Configure Git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── 5. 전체 대기 글 루프 처리 ──────────────────────────────────
      - name: Write all pending articles
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          MAX_ARTICLES=20
          COUNT=0

          while [ $COUNT -lt $MAX_ARTICLES ]; do

            # ── 다음 대상 선택 ──────────────────────────────────────
            RESULT=$(python write.py next --json)
            OK=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin).get('ok', False))")

            if [ "$OK" != "True" ]; then
              echo "✅ 처리할 대상 없음 — 루프 종료"
              break
            fi

            CLUSTER=$(echo "$RESULT" | python -c "import sys,json; print(json.load(sys.stdin)['cluster_name'])")
            TYPE=$(echo "$RESULT"    | python -c "import sys,json; print(json.load(sys.stdin)['content_type'])")
            COUNT=$((COUNT + 1))

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "[$COUNT] 🖊️  $CLUSTER [$TYPE]"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # ── prep ────────────────────────────────────────────────
            echo "📝 [1/4] prep..."
            if ! python write.py prep "$CLUSTER" --type "$TYPE"; then
              echo "❌ prep 실패 — 다음 대상으로 스킵"
              continue
            fi

            # ── Gemini 초안 ─────────────────────────────────────────
            echo "🤖 [2/4] Gemini 초안..."
            if ! python gemini_api.py --cluster "$CLUSTER" --type "$TYPE"; then
              echo "❌ Gemini 실패 — 다음 대상으로 스킵"
              continue
            fi

            # ── review_prompt 생성 ──────────────────────────────────
            echo "🔍 [3/4] review prompt..."
            if ! python write.py review "$CLUSTER" --type "$TYPE"; then
              echo "❌ review 실패 — 다음 대상으로 스킵"
              continue
            fi

            # ── Gemini 팩트체크 + 최종본 ────────────────────────────
            echo "✨ [4/4] Gemini 팩트체크 + 최종본..."
            if ! python gemini_review_api.py --cluster "$CLUSTER" --type "$TYPE"; then
              echo "❌ Gemini Review 실패 — 다음 대상으로 스킵"
              continue
            fi

            # ── write.py done — 파이프라인 완료 기록 (루프 방지 핵심) ──
            echo "📌 [done] pipeline 기록..."
            FINAL_FILE="research_data/write/final/$(echo "$CLUSTER" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | cut -c1-60)_${TYPE}.md"
            TITLE=$(head -1 "$FINAL_FILE" 2>/dev/null | sed 's/^# //' || echo "$CLUSTER")
            python write.py done "$CLUSTER" \
              --type "$TYPE" \
              --title "$TITLE" \
              --url "PENDING" || echo "⚠️ done 실패 (무시하고 계속)"

            # ── final/ 커밋 ─────────────────────────────────────────
            git stash
            git pull origin main --rebase
            git stash pop
            git add research_data/write/final/ content_pipeline.json

            if git diff --cached --quiet; then
              echo "⚠️ 변경사항 없음 — 커밋 스킵"
            else
              git commit -m "feat: [$TYPE] $CLUSTER 최종본 생성"
              git push origin HEAD:main
              echo "✅ 커밋 완료: [$TYPE] $CLUSTER"
            fi

          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🏁 전체 완료: $COUNT 건 처리"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
