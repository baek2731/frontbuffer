title: "Frontbuffer"
description: "Tech and gaming analysis. What's actually happening and why it matters."
url: "https://frontbuffer.net"
baseurl: ""
locale: "en-US"
# theme: minimal-mistakes-jekyll
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "dark"
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-feed
  - jekyll-remote-theme
permalink: /:categories/:title/
paginate: 5
paginate_path: "/page:num/"
timezone: "Asia/Seoul"
include:
  - _pages
author:
  name: "Frontbuffer Editorial"
  bio: "Independent tech and gaming analysis. Research-backed, no hype."
  location: "Global"
  links:
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
search: false
logo: "/favicon.ico"
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-XXXXXXXXXX"
    anonymize_ip: false
